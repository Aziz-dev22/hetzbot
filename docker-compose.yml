version: '3.8'
services:
  bot:
    build: .
    env_file:
      - .env
    depends_on:
      - db
  
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hetzbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  panel:
    build: .
    command: uvicorn panel.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pgdata:
